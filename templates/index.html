<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Processor Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            backdrop-filter: blur(12px);
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .no-procesados .stat-value { color: var(--accent-blue); }
        .procesados .stat-value { color: var(--accent-green); }

        .btn-container {
            text-align: center;
        }

        .btn-process {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .btn-process:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-process:active {
            transform: scale(0.98);
        }

        .btn-process:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-msg {
            margin-top: 20px;
            text-align: center;
            font-size: 0.95rem;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            display: block;
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            display: block;
        }

        /* Tabla de Resultados */
        .results-container {
            margin-top: 40px;
            display: none;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-main);
            border-left: 4px solid var(--primary);
            padding-left: 12px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            text-align: left;
            padding: 12px 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .price-tag {
            color: var(--accent-green);
            font-weight: 700;
        }

        /* Botón de Descarga */
        .btn-download {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download:hover {
            border-color: var(--primary);
            color: var(--text-main);
            background: rgba(99, 102, 241, 0.1);
        }

        /* Fila de Subtotal */
        .row-subtotal {
            background: rgba(99, 102, 241, 0.1) !important;
            font-weight: 700;
        }
        
        .row-subtotal td {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #818cf8 !important;
        }

        tr:not(.row-subtotal):hover td {
            background: rgba(255, 255, 255, 0.03);
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
            <div style="flex-grow: 1;">
                <h1>Invoice Pro</h1>
                <p class="subtitle" style="text-align: left; margin-bottom: 0;">Automatizando el procesamiento de tus facturas</p>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <a href="/download-manual" class="btn-download" style="border: 1px solid var(--accent-blue); color: var(--text-main); background: rgba(59, 130, 246, 0.1);">
                    <span>📖 Manual (.txt)</span>
                </a>
                <a href="/download" class="btn-download" id="download-btn" style="display: none; cursor: pointer; border: 1px solid var(--accent-green); color: var(--text-main); background: rgba(16, 185, 129, 0.1);">
                    <span>📥 Descargar Excel</span>
                </a>
                <a href="/download-all" class="btn-download" id="download-zip-btn" style="display: none; cursor: pointer; border: 1px solid var(--primary); color: var(--text-main); background: rgba(99, 102, 241, 0.1);">
                    <span>📦 Descargar Todo (.zip)</span>
                </a>
                <button class="btn-download" id="open-excel-btn" style="display: none; cursor: pointer; border: 1px solid var(--primary); color: var(--text-main); background: rgba(99, 102, 241, 0.1);">
                    <span>📊 Abrir Local</span>
                </button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card no-procesados">
                <span class="stat-value" id="count-pending">-</span>
                <span class="stat-label">Pendientes</span>
            </div>
            <div class="stat-card procesados">
                <span class="stat-value" id="count-done">-</span>
                <span class="stat-label">Procesadas</span>
            </div>
        </div>

        <div class="btn-container" style="display: flex; gap: 16px; margin-bottom: 20px;">
            <div style="flex: 1;">
                <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
                <button id="upload-btn" class="btn-process" style="background: var(--accent-blue);">
                    <span id="upload-text">📁 Subir Facturas</span>
                    <div id="upload-loader" class="loader"></div>
                </button>
            </div>
            <div style="flex: 1;">
                <button id="process-btn" class="btn-process">
                    <span id="btn-text">Iniciar Procesamiento</span>
                    <div id="btn-loader" class="loader"></div>
                </button>
            </div>
        </div>

        <div id="status-msg" class="status-msg"></div>

        <div id="results-container" class="results-container">
            <div class="results-header">Reporte de Facturas</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Suplidor</th>
                            <th>Fecha</th>
                            <th>NCF</th>
                            <th>Vencimiento</th>
                            <th style="text-align: right;">ITBIS</th>
                            <th style="text-align: right;">Total</th>
                            <th style="text-align: center;">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="results-body">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const pendingEl = document.getElementById('count-pending');
        const doneEl = document.getElementById('count-done');
        const processBtn = document.getElementById('process-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const statusMsg = document.getElementById('status-msg');
        const resultsContainer = document.getElementById('results-container');
        const resultsBody = document.getElementById('results-body');
        const downloadBtn = document.getElementById('download-btn');
        const downloadZipBtn = document.getElementById('download-zip-btn');
        const openExcelBtn = document.getElementById('open-excel-btn');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadText = document.getElementById('upload-text');
        const uploadLoader = document.getElementById('upload-loader');

        async function updateStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                pendingEl.textContent = data.no_procesados;
                doneEl.textContent = data.procesados;
                
                if (data.no_procesados === 0) {
                    processBtn.disabled = true;
                    btnText.textContent = "Nada que procesar";
                } else {
                    processBtn.disabled = false;
                    btnText.textContent = "Iniciar Procesamiento";
                }
            } catch (err) {
                console.error("Error fetching status", err);
            }
        }

        openExcelBtn.addEventListener('click', async () => {
            try {
                const res = await fetch('/open-excel');
                const data = await res.json();
                if (!data.success) alert(data.message);
            } catch (err) {
                console.error("Error opening excel", err);
            }
        });

        uploadBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async () => {
            if (fileInput.files.length === 0) return;

            const formData = new FormData();
            for (const file of fileInput.files) {
                formData.append('files', file);
            }

            uploadBtn.disabled = true;
            uploadText.textContent = "Subiendo...";
            uploadLoader.style.display = "inline-block";
            statusMsg.style.display = "none";

            try {
                const res = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    statusMsg.textContent = data.message;
                    statusMsg.className = "status-msg status-success";
                } else {
                    statusMsg.textContent = data.message || "Error al subir";
                    statusMsg.className = "status-msg status-error";
                }
            } catch (err) {
                statusMsg.textContent = "Error de conexión";
                statusMsg.className = "status-msg status-error";
            } finally {
                uploadBtn.disabled = false;
                uploadText.textContent = "📁 Subir Facturas";
                uploadLoader.style.display = "none";
                statusMsg.style.display = "block";
                fileInput.value = ''; // Reset
                await updateStatus();
            }
        });

        processBtn.addEventListener('click', async () => {
            processBtn.disabled = true;
            btnText.textContent = "Procesando...";
            btnLoader.style.display = "inline-block";
            statusMsg.style.display = "none";

            try {
                const res = await fetch('/process', { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    statusMsg.textContent = data.message;
                    statusMsg.className = "status-msg status-success";
                    
                    if (data.data && data.data.length > 0) {
                        renderResults(data.data);
                    }
                } else {
                    statusMsg.textContent = data.message || "Error desconocido";
                    statusMsg.className = "status-msg status-error";
                }
            } catch (err) {
                statusMsg.textContent = "Error de conexión con el servidor";
                statusMsg.className = "status-msg status-error";
            } finally {
                btnLoader.style.display = "none";
                statusMsg.style.display = "block";
                await updateStatus();
            }
        });

        function renderResults(entries) {
            resultsBody.innerHTML = '';
            let sumItbis = 0;
            let sumTotal = 0;

            entries.forEach(entry => {
                sumItbis += (entry.ITBIS || 0);
                sumTotal += (entry.Total || 0);

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${entry.Suplidor}</td>
                    <td>${entry.Fecha}</td>
                    <td style="font-family: monospace; font-size: 0.85rem;">${entry.NCF}</td>
                    <td>${entry['Fecha Vencimiento'] || '-'}</td>
                    <td class="price-tag" style="text-align: right;">${entry.ITBIS ? '$' + entry.ITBIS.toLocaleString() : '-'}</td>
                    <td class="price-tag" style="text-align: right;">$${entry.Total.toLocaleString()}</td>
                    <td style="text-align: center;">
                        <a href="/download-file/${entry.Archivo}" class="btn-download" title="Descargar Imagen" style="padding: 4px 8px; font-size: 0.7rem;">
                            📥 JPG
                        </a>
                    </td>
                `;
                resultsBody.appendChild(row);
            });

            // Fila de Total
            const totalRow = document.createElement('tr');
            totalRow.className = 'row-subtotal'; // Reutilizamos el estilo de subtotal
            totalRow.style.fontWeight = 'bold';
            totalRow.style.borderTop = '2px solid var(--primary)';
            totalRow.innerHTML = `
                <td colspan="4" style="text-align: right; padding-right: 20px;">TOTAL GENERAL</td>
                <td class="price-tag" style="text-align: right;">$${sumItbis.toLocaleString()}</td>
                <td class="price-tag" style="text-align: right;">$${sumTotal.toLocaleString()}</td>
                <td></td>
            `;
            resultsBody.appendChild(totalRow);

            resultsContainer.style.display = "block";
            openExcelBtn.style.display = "inline-flex";
            if (downloadBtn) downloadBtn.style.display = "inline-flex";
            downloadZipBtn.style.display = "inline-flex";
        }

        // Carga inicial y configuración de entorno
        async function initApp() {
            try {
                const res = await fetch('/config');
                const config = await res.json();
                
                if (config.is_local) {
                    // Ocultar el contenedor de "Subir Facturas" en local
                    const uploadWrapper = uploadBtn.parentElement;
                    if (uploadWrapper) {
                        uploadWrapper.style.display = 'none';
                        // Expandir el botón de procesamiento para que ocupe todo el ancho
                        processBtn.parentElement.style.flex = '100%';
                    }
                    console.log("Modo Local detectado: Ocultando botón de subida.");
                }
            } catch (err) {
                console.error("Error cargando configuración", err);
            }
            // Actualizar estado inicial (esto contará archivos en /NO PROCESADOS automáticamente en local)
            updateStatus();
        }

        initApp();
    </script>
</body>
</html>
