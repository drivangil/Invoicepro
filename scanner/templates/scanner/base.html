<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{% block title %}InvoicePro{% endblock %}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"><style>:root{--primary:#6366f1;--primary-hover:#4f46e5;--bg:#0f172a;--card-bg:rgba(30,41,59,0.7);--text-main:#f8fafc;--text-muted:#94a3b8;--accent-green:#10b981;--accent-blue:#3b82f6}body{background-color:var(--bg);background-image:radial-gradient(at 0% 0%,rgba(99,102,241,0.15) 0px,transparent 50%),radial-gradient(at 100% 100%,rgba(59,130,246,0.15) 0px,transparent 50%);color:var(--text-main);min-height:100vh;font-family:'Outfit',sans-serif}.navbar{background:rgba(15,23,42,0.8);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05)}.navbar-brand{font-weight:700;background:linear-gradient(to right,#818cf8,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.card{background:var(--card-bg);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;color:var(--text-main)}h1,h2,h3{font-weight:700}.btn-primary{background:var(--primary);border:none;border-radius:12px;padding:12px 24px;transition:all 0.3s ease}.btn-primary:hover{background:var(--primary-hover);transform:translateY(-2px)}</style></head><body><nav class="navbar navbar-dark navbar-expand-lg"><div class="container"><a class="navbar-brand" href="{% url 'scanner:dashboard' %}">InvoicePro</a><div class="navbar-nav ms-auto align-items-center">{% if user.is_authenticated %}<a href="{% url 'scanner:config' %}" class="me-3 hover-scale"><img src="https://img.icons8.com/material-outlined/24/ffffff/settings--v1.png" alt="Ajustes"></a><span class="nav-link text-white small me-3">{{ user.username }}</span><form action="{% url 'logout' %}" method="post">{% csrf_token %}<button type="submit" class="btn btn-outline-light btn-sm rounded-pill px-3">Salir</button></form>{% endif %}</div></div></nav><div class="container py-5">{% block content %}{% endblock %}</div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script></body></html>
